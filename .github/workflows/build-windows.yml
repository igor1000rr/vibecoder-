name: Build Windows Only (fast)

# Лёгкий workflow для итеративных фиксов Windows-сборки. Не делает Release,
# только собирает .exe и заливает в Artifacts. Запуск только вручную.

on:
  workflow_dispatch:

env:
  NODE_VERSION: '22.18.0'
  PYTHON_VERSION: '3.11'

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-2022
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python (для node-gyp)
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: npm install --no-audit --no-fund
        env:
          npm_config_arch: x64
          npm_config_target_arch: x64
          npm_config_loglevel: error

      - name: Patch lib.dom.d.ts + @types/node (variance fix)
        run: node build/patches/fix-variance.cjs

      - name: Generate icons (PNG + ICO)
        run: node resources/vibecoder/generate-icons.cjs

      - name: Compile
        run: npm run gulp -- compile-build-with-mangling compile-extensions-build
        env:
          VSCODE_SKIP_PRELAUNCH: 1

      - name: Minify
        run: npm run gulp -- minify-vscode

      - name: Build Windows app (unsigned)
        # Создаёт ../VSCode-win32-x64/ (на уровень выше репо, см. build/gulpfile.vscode.win32.js).
        run: npm run gulp -- vscode-win32-x64-min-ci

      - name: Copy Inno Updater (создаёт VSCode-win32-x64/tools/)
        # Без этого шага Inno Setup падает на строке [Files] "tools\*" т.к. папки нет.
        run: npm run gulp -- vscode-win32-x64-inno-updater

      - name: Build Inno Setup installer (system-wide)
        # Выход: .build/win32-x64/system-setup/VSCodeSetup.exe
        run: npm run gulp -- vscode-win32-x64-system-setup

      - name: Build Inno Setup installer (user-wide)
        # Выход: .build/win32-x64/user-setup/VSCodeSetup.exe
        run: npm run gulp -- vscode-win32-x64-user-setup

      - name: Create portable zip
        # VSCode-win32-x64 лежит на уровень выше репо (см. buildPath в gulpfile.vscode.win32.js).
        # Архив пакуем в .build/ внутри репо чтобы upload-artifact его подхватил.
        shell: pwsh
        run: |
          $appDir = Join-Path $env:GITHUB_WORKSPACE "..\VSCode-win32-x64"
          if (Test-Path $appDir) {
            New-Item -ItemType Directory -Force -Path '.build\win32-x64\archive' | Out-Null
            $zipPath = '.build\win32-x64\archive\Vibecoder-win32-x64.zip'
            Compress-Archive -Path "$appDir\*" -DestinationPath $zipPath -Force
            $sizeMB = [math]::Round((Get-Item $zipPath).Length / 1MB, 1)
            Write-Host "Created $zipPath ($sizeMB MB)"
          } else {
            Write-Error "Папка $appDir не найдена"
            exit 1
          }

      - name: Copy app folder into workspace (для upload-artifact)
        # upload-artifact не может выйти за пределы $GITHUB_WORKSPACE,
        # поэтому копируем ..\VSCode-win32-x64 → .build\win32-x64\app
        shell: pwsh
        run: |
          $appDir = Join-Path $env:GITHUB_WORKSPACE "..\VSCode-win32-x64"
          if (Test-Path $appDir) {
            New-Item -ItemType Directory -Force -Path '.build\win32-x64\app' | Out-Null
            Copy-Item -Path "$appDir\*" -Destination '.build\win32-x64\app' -Recurse -Force
            Write-Host "Copied app folder to .build\win32-x64\app"
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vibecoder-windows-x64
          path: |
            .build/win32-x64/system-setup/*.exe
            .build/win32-x64/user-setup/*.exe
            .build/win32-x64/archive/*.zip
            .build/win32-x64/app/
          retention-days: 7
