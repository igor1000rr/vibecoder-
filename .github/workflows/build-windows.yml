name: Build Windows Only (fast)

# Лёгкий workflow для итеративных фиксов Windows-сборки. Не делает Release,
# только собирает .exe и заливает в Artifacts. Запуск только вручную.

on:
  workflow_dispatch:

env:
  NODE_VERSION: '22.18.0'
  PYTHON_VERSION: '3.11'

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-2022
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python (для node-gyp)
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: npm install --no-audit --no-fund
        env:
          npm_config_arch: x64
          npm_config_target_arch: x64
          npm_config_loglevel: error

      - name: Patch lib.dom.d.ts + @types/node (variance fix)
        # TS 5.8 + lib.dom 2025+ сузили BlobPart/BufferSource/FileSystemWriteChunkType/
        # GPUAllowSharedBufferSource через ArrayBufferView<ArrayBuffer> (исключая SharedArrayBuffer).
        # @types/node 22.x объявил Buffer extends Uint8Array<ArrayBufferLike>.
        # Скрипт fix-variance.cjs:
        #   1. Меняет 4 типа в lib.dom.d.ts на `any`.
        #   2. Buffer extends Uint8Array<ArrayBufferLike> → <ArrayBuffer>.
        #   3. Глобально <ArrayBufferLike> → <ArrayBuffer> во всех .d.ts TS+@types/node.
        # PowerShell -replace в прошлой версии не справлялся с multiline — Node.js надёжнее.
        run: node build/patches/fix-variance.cjs

      - name: Generate icons (PNG + ICO)
        run: node resources/vibecoder/generate-icons.cjs

      - name: Compile
        run: npm run gulp -- compile-build-with-mangling compile-extensions-build
        env:
          VSCODE_SKIP_PRELAUNCH: 1

      - name: Minify
        run: npm run gulp -- minify-vscode

      - name: Build Windows app (unsigned)
        run: npm run gulp -- vscode-win32-x64-min-ci

      - name: Build Inno Setup installer
        run: npm run gulp -- vscode-win32-x64-system-setup
        continue-on-error: true

      - name: Create portable zip
        run: npm run gulp -- vscode-win32-x64-archive
        continue-on-error: true

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vibecoder-windows-x64
          path: |
            .build/**/*.exe
            .build/**/*.zip
            VSCode-win32-x64/
          retention-days: 7
